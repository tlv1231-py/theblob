strategy:
  name: crypto_momentum
  description: "EMA trend scalping — fast EMAs, profit target exit, constant re-entry"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOT/USD
  - DOGE/USD
  - LTC/USD
  - BCH/USD
  - UNI/USD
  - AAVE/USD
  - SHIB/USD
  - MKR/USD
  - CRV/USD
  - XTZ/USD

signals:
  ema_fast: 2                # fastest possible EMA — flips on every bar shift
  ema_slow: 5                # tight slow — captures micro-momentum, not macro trend

position:
  risk_pct: 1.0              # % of account value per position
  max_positions: 15          # all pairs eligible simultaneously
  stop_pct: 0.002            # 0.2% hard stop
  target_pct: 0.003          # 0.3% target — 1.5:1 R:R, hits faster, re-enters sooner
  max_hold_minutes: 4        # force exit after 4 min — keeps capital cycling

risk:
  max_daily_loss_pct: 0.10
  max_daily_trades: 500      # raised ceiling to match higher activity

execution:
  slippage_bps: 15
  paper: true
