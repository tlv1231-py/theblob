strategy:
  name: crypto_momentum
  description: "10-bar breakout + 24h VWAP + RVOL on 1-min crypto bars"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOT/USD
  - DOGE/USD
  - LTC/USD
  - BCH/USD
  - UNI/USD
  - AAVE/USD
  - SHIB/USD
  - MKR/USD
  - CRV/USD
  - XTZ/USD

signals:
  ema_fast: 5                # fast EMA period (1-min bars)
  ema_slow: 13               # slow EMA period (1-min bars)
  # crossover fires when fast crosses above/below slow

position:
  risk_pct: 1.0              # % of account value per position (THE dial)
  max_positions: 5           # max concurrent open positions
  stop_pct: 0.005            # 0.5% stop — only hard exit besides EMA reversal
  max_hold_minutes: 240      # 4hr safety net (EMA reversal is primary exit)

risk:
  max_daily_loss_pct: 0.10   # halt all trading if down 10% on the day
  max_daily_trades: 200      # sanity ceiling

execution:
  slippage_bps: 15           # 15bps simulated slippage on paper
  paper: true
