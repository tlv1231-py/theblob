strategy:
  name: crypto_momentum
  description: "EMA trend scalping — fast EMAs, profit target exit, constant re-entry"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOT/USD
  - DOGE/USD
  - LTC/USD
  - BCH/USD
  - UNI/USD
  - AAVE/USD
  - SHIB/USD
  - MKR/USD
  - CRV/USD
  - XTZ/USD

signals:
  ema_fast: 3                # fast EMA — flips frequently on 1-min bars
  ema_slow: 8                # slow EMA

position:
  risk_pct: 1.0              # % of account value per position
  max_positions: 15          # all pairs eligible simultaneously
  stop_pct: 0.005            # 0.5% hard stop
  target_pct: 0.004          # 0.4% profit target — take it and re-evaluate
  max_hold_minutes: 30       # force re-evaluation every 30 min

risk:
  max_daily_loss_pct: 0.10
  max_daily_trades: 500      # raised ceiling to match higher activity

execution:
  slippage_bps: 15
  paper: true
