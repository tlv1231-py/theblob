strategy:
  name: crypto_momentum
  description: "1-min breakout + VWAP + volume spike — fires on every real momentum move"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - XTZ/USD
  - CRV/USD

signals:
  bar_size: 1Min             # 1-min bars — maximum signal frequency
  breakout_bars: 2           # just clear the last 2 bars — fires constantly
  min_breakout_pct: 0.03     # 0.03% threshold — almost any up-tick qualifies
  vwap_window_bars: 10       # 10-bar micro-VWAP — easy to be above it
  rvol_min: 1.0              # any volume — no volume gate

position:
  risk_pct: 1.0              # 1% NAV per trade
  max_positions: 9           # all 9 symbols simultaneously
  stop_pct: 0.003            # 0.3% stop — tight, fast exit
  target_pct: 0.006          # 0.6% target → 2:1 R:R, quick hits
  max_hold_minutes: 2        # 2-min max hold — slots turn over constantly

risk:
  max_daily_loss_pct: 0.10   # 10% daily loss ceiling
  max_daily_trades: 9999     # effectively unlimited

execution:
  slippage_bps: 10
  paper: true
