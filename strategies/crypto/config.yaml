strategy:
  name: crypto_momentum
  description: "1-min breakout + VWAP + volume spike — fires on every real momentum move"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - XTZ/USD
  - CRV/USD

signals:
  breakout_bars: 3           # close must break 3-bar high — still real momentum, much more frequent
  min_breakout_pct: 0.06     # must break by at least 0.06% — filters pure noise
  vwap_window_bars: 30       # 30-bar (~30min) rolling VWAP — tighter, more responsive
  rvol_min: 1.2              # volume >= 1.2x 20-bar avg — modest conviction bar

position:
  risk_pct: 1.0              # 1% NAV per trade
  max_positions: 5           # up to 5 simultaneous trades
  stop_pct: 0.005            # 0.5% stop — survivable between 60s polls
  target_pct: 0.010          # 1.0% target → 2:1 R:R
  max_hold_minutes: 5        # exit flat after 5 min if neither stop nor target hit

risk:
  max_daily_loss_pct: 0.05
  max_daily_trades: 500      # high ceiling — signal quality filters it

execution:
  slippage_bps: 10
  paper: true
