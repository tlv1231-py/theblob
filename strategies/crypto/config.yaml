strategy:
  name: crypto_momentum
  description: "Breakout + VWAP + RVOL scalping — wider target, tighter signal filter"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - UNI/USD
  - CRV/USD

signals:
  breakout_bars: 10          # close must break N-bar high/low — more bars = cleaner breakout
  vwap_window_hours: 4       # shorter VWAP window — more responsive to today's trend
  rvol_min: 1.8              # require 1.8x average volume — only trade high-conviction bars

position:
  risk_pct: 0.5              # halved — smaller positions, more room to be wrong
  max_positions: 5           # focus on top 5 signals at once, not all 15
  stop_pct: 0.0025           # 0.25% stop — wider than before, gives trade room to breathe
  target_pct: 0.008          # 0.8% target — 3.2:1 R:R after 10bps slippage round-trip
  max_hold_minutes: 8        # hold longer to let winners develop

risk:
  max_daily_loss_pct: 0.05   # tighter daily loss limit — 5% of account
  max_daily_trades: 200      # still high ceiling — signal quality filters it naturally

execution:
  slippage_bps: 10           # realistic for top-tier crypto on Alpaca (was 15, too pessimistic)
  paper: true
