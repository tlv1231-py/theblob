strategy:
  name: crypto_momentum
  description: "EMA trend scalping — fast EMAs, profit target exit, constant re-entry"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOT/USD
  - DOGE/USD
  - LTC/USD
  - BCH/USD
  - UNI/USD
  - AAVE/USD
  - SHIB/USD
  - MKR/USD
  - CRV/USD
  - XTZ/USD

signals:
  ema_fast: 3                # 1-min fast EMA
  ema_slow: 8                # 1-min slow EMA — cleaner crossovers than 2/5

position:
  risk_pct: 1.0              # % of account value per position
  max_positions: 15          # all pairs eligible simultaneously
  stop_pct: 0.0015           # 0.15% stop — tighter, cut losers faster
  target_pct: 0.003          # 0.3% target — 2:1 R:R, need only 34% win rate
  max_hold_minutes: 3        # force exit after 3 min — keeps capital cycling

risk:
  max_daily_loss_pct: 0.10
  max_daily_trades: 500      # raised ceiling to match higher activity

execution:
  slippage_bps: 15
  paper: true
