strategy:
  name: crypto_momentum
  description: "1-min breakout + VWAP + volume spike — fires on every real momentum move"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - XTZ/USD
  - CRV/USD

signals:
  breakout_bars: 8           # close must break 8-bar high — clean momentum, not noise
  min_breakout_pct: 0.12     # must break by at least 0.12% — filters dust crossovers
  vwap_window_bars: 60       # 60-bar (~1hr) rolling VWAP — price must be above it
  rvol_min: 1.6              # volume >= 1.6x 20-bar avg — only trade on conviction bars

position:
  risk_pct: 1.0              # 1% NAV per trade
  max_positions: 5           # up to 5 simultaneous trades
  stop_pct: 0.005            # 0.5% stop — survivable between 60s polls
  target_pct: 0.010          # 1.0% target → 2:1 R:R
  max_hold_minutes: 5        # exit flat after 5 min if neither stop nor target hit

risk:
  max_daily_loss_pct: 0.05
  max_daily_trades: 500      # high ceiling — signal quality filters it

execution:
  slippage_bps: 10
  paper: true
