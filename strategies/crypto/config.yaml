strategy:
  name: crypto_momentum
  description: "EMA crossover + hourly trend confirmation — 1-min momentum gated by 1-hr bias"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - UNI/USD
  - CRV/USD

signals:
  ema_fast: 5                # fast EMA period on 1-min bars
  ema_slow: 20               # slow EMA period on 1-min bars
  min_separation: 0.0002     # minimum fast/slow spread (0.02%) to avoid noise trades

position:
  risk_pct: 0.5              # 0.5% of NAV per trade — small, survives a run of losers
  max_positions: 5           # max concurrent open positions
  stop_pct: 0.0025           # 0.25% stop below entry
  target_pct: 0.008          # 0.8% target — 3.2:1 R:R after slippage
  max_hold_minutes: 12       # exit if still open after 12 min regardless

risk:
  max_daily_loss_pct: 0.05   # tighter daily loss limit — 5% of account
  max_daily_trades: 200      # still high ceiling — signal quality filters it naturally

execution:
  slippage_bps: 10           # realistic for top-tier crypto on Alpaca (was 15, too pessimistic)
  paper: true
