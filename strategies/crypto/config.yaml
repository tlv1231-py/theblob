strategy:
  name: crypto_momentum
  description: "1-min breakout + VWAP + volume spike — fires on every real momentum move"

universe:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - DOGE/USD
  - BCH/USD
  - XTZ/USD
  - CRV/USD

signals:
  bar_size: 5Min             # 5-min bars — real structure, not 1-min noise
  breakout_bars: 10          # close must break 10-bar high (~50 min of structure)
  min_breakout_pct: 0.20     # must break by at least 0.20% — real move, not a tick
  vwap_window_bars: 48       # 48 × 5min = 4hr rolling VWAP
  rvol_min: 1.5              # 1.5x 20-bar avg volume — real conviction

position:
  risk_pct: 1.0              # 1% NAV per trade
  max_positions: 3           # fewer, higher-quality positions
  stop_pct: 0.008            # 0.8% stop — wider to survive 5-min bar range
  target_pct: 0.020          # 2.0% target → 2.5:1 R:R
  max_hold_minutes: 30       # exit flat after 30 min if neither stop nor target hit

risk:
  max_daily_loss_pct: 0.05
  max_daily_trades: 500      # high ceiling — signal quality filters it

execution:
  slippage_bps: 10
  paper: true
