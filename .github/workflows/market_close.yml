name: Market Close

on:
  schedule:
    # 4:00 PM ET = 20:00 UTC (EDT, Mar-Nov). Adjust to 21:00 UTC in winter (EST).
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  log-close:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-ingest closing data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ENV: production
        run: python scripts/market_close_ingest.py
