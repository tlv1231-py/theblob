name: crypto_momentum runner

on:
  schedule:
    # Two overlapping schedules — no gap between jobs
    - cron: '0 */5 * * *'   # fires at 0,5,10,15,20 UTC
    - cron: '30 2,7,12,17,22 * * *'  # fires at 2:30,7:30,12:30,17:30,22:30 UTC — safety net
  workflow_dispatch:

concurrency:
  group: crypto-runner
  cancel-in-progress: false  # queue next run; don't cancel the running one

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 310   # 5h10m — overlaps with next 5h cron fire

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run crypto_momentum loop (max throughput)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
        run: |
          while true; do
            python -m strategies.crypto.runner
            sleep 5
          done
