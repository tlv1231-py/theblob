name: crypto_momentum runner

on:
  schedule:
    - cron: '*/2 * * * *'  # fallback if self-trigger ever stops
  workflow_dispatch:        # manual trigger + self-trigger

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run crypto_momentum
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
        run: python -m strategies.crypto.runner

      - name: Schedule next run in 2 minutes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 120
          gh workflow run crypto_runner.yml --repo ${{ github.repository }}
