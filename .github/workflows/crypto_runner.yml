name: crypto_momentum runner

on:
  schedule:
    # Restart the long-running loop every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h50m — safely under GitHub's 6h job limit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run crypto_momentum loop (max throughput)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
        run: |
          while true; do
            python -m strategies.crypto.runner
            sleep 5
          done
