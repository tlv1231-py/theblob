name: Restore DB to Supabase (run once)

on:
  workflow_dispatch: # manual trigger only

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Download dump from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download db-dump \
            --repo tlv1231-py/theblob \
            --pattern "theblob_dump.dump" \
            --output theblob_dump.dump

      - name: Restore to Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_restore \
            -h db.seeevuklabvhkawawtxn.supabase.co \
            -p 5432 \
            -U postgres \
            -d postgres \
            --no-owner \
            --no-acl \
            --verbose \
            theblob_dump.dump
