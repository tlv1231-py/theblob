name: Market Open

on:
  schedule:
    # 9:30 AM ET = 13:30 UTC (EDT, Mar-Nov). Adjust to 14:30 UTC in winter (EST).
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  log-open:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Market open intelligence check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ENV: production
        run: python scripts/market_open_check.py

      - name: Morning signal preview
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENV: production
        run: python scripts/market_open_signals.py
